name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}
    steps:
      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.tag.outputs.TAG }}" --repo "${{ github.repository }}" --draft --title "${{ steps.tag.outputs.TAG }}" --notes "Release ${{ steps.tag.outputs.TAG }}"

  build-x64:
    needs: create-release
    runs-on: windows-latest
    name: Build (x64)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer (x64)
        run: npx electron-builder --win --x64 --publish never

      - name: Verify x64 artifacts
        shell: bash
        run: |
          echo "=== x64 release artifacts ==="
          ls -lh release/nsis-web/*.exe release/nsis-web/*.7z 2>/dev/null || true
          if ls release/nsis-web/*.exe 1>/dev/null 2>&1; then
            echo "x64 stub installer found"
          else
            echo "ERROR: No x64 .exe found" && exit 1
          fi

      - name: Upload x64 artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release/nsis-web
          sha256sum *.exe *.7z 2>/dev/null > checksums-x64.sha256 || true
          cat checksums-x64.sha256
          TAG="${{ needs.create-release.outputs.tag }}"
          gh release upload "$TAG" *.exe *.7z checksums-x64.sha256 latest.yml --clobber 2>/dev/null || true

  build-arm64:
    needs: create-release
    runs-on: windows-latest
    name: Build (arm64)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (arm64 prebuilds)
        run: npm ci
        env:
          npm_config_arch: arm64

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer (arm64)
        run: npx electron-builder --win --arm64 --publish never

      - name: Verify arm64 artifacts
        shell: bash
        run: |
          echo "=== arm64 release artifacts ==="
          ls -lh release/nsis-web/*.exe release/nsis-web/*.7z 2>/dev/null || true
          if ls release/nsis-web/*.exe 1>/dev/null 2>&1; then
            echo "arm64 stub installer found"
          else
            echo "ERROR: No arm64 .exe found" && exit 1
          fi

      - name: Upload arm64 artifacts to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release/nsis-web
          sha256sum *.exe *.7z 2>/dev/null > checksums-arm64.sha256 || true
          cat checksums-arm64.sha256
          TAG="${{ needs.create-release.outputs.tag }}"
          gh release upload "$TAG" *.exe *.7z checksums-arm64.sha256 --clobber 2>/dev/null || true
