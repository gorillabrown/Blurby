name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    name: Build (x64 + arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build

      - name: Package Windows installers (x64 + arm64)
        # Build both architectures in a single electron-builder invocation so
        # it produces one latest.yml that already lists both file entries —
        # no post-processing merge required.
        run: npx electron-builder --win --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify latest.yml contains both architectures
        shell: bash
        run: |
          grep -q "x64" release/latest.yml || (echo "ERROR: x64 missing from latest.yml" && exit 1)
          grep -q "arm64" release/latest.yml || (echo "ERROR: arm64 missing from latest.yml" && exit 1)
          echo "Both architectures verified in latest.yml"
          cat release/latest.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blurby-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: blurby-release
          path: artifacts/

      - name: Verify latest.yml contains both architectures
        run: |
          grep -q "x64" artifacts/latest.yml || (echo "ERROR: x64 missing" && exit 1)
          grep -q "arm64" artifacts/latest.yml || (echo "ERROR: arm64 missing" && exit 1)
          echo "Both architectures verified in latest.yml"
          cat artifacts/latest.yml

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          sha256sum *.exe *.blockmap > checksums.sha256
          cat checksums.sha256

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/latest*.yml
            artifacts/checksums.sha256
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
