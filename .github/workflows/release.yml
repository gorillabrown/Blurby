name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-x64:
    runs-on: windows-latest
    name: Build (x64)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer (x64)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify x64 artifacts
        shell: bash
        run: |
          echo "=== x64 release artifacts ==="
          ls -lh release/nsis-web/*.exe release/nsis-web/*.7z 2>/dev/null || true
          if ls release/nsis-web/*.exe 1>/dev/null 2>&1; then
            echo "x64 stub installer found"
          else
            echo "ERROR: No x64 .exe found" && exit 1
          fi

      - name: Generate and upload SHA-256 checksums (x64)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release/nsis-web
          sha256sum *.exe *.7z 2>/dev/null > checksums-x64.sha256 || true
          cat checksums-x64.sha256
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          gh release upload "$TAG" checksums-x64.sha256 --clobber

  build-arm64:
    runs-on: windows-latest
    name: Build (arm64)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (arm64 prebuilds)
        run: npm ci
        env:
          npm_config_arch: arm64

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer (arm64)
        run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify arm64 artifacts
        shell: bash
        run: |
          echo "=== arm64 release artifacts ==="
          ls -lh release/nsis-web/*.exe release/nsis-web/*.7z 2>/dev/null || true
          if ls release/nsis-web/*.exe 1>/dev/null 2>&1; then
            echo "arm64 stub installer found"
          else
            echo "ERROR: No arm64 .exe found" && exit 1
          fi

      - name: Generate and upload SHA-256 checksums (arm64)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release/nsis-web
          sha256sum *.exe *.7z 2>/dev/null > checksums-arm64.sha256 || true
          cat checksums-arm64.sha256
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          gh release upload "$TAG" checksums-arm64.sha256 --clobber
