name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    name: Build (x64 + arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build

      - name: Package Windows installers (x64 + arm64)
        # electron-builder uploads assets directly to the GitHub draft release
        # via GH_TOKEN — no need for a separate artifact upload/publish job.
        run: npx electron-builder --win --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify latest.yml contains both architectures
        shell: bash
        run: |
          grep -q "x64" release/latest.yml || (echo "ERROR: x64 missing from latest.yml" && exit 1)
          grep -q "arm64" release/latest.yml || (echo "ERROR: arm64 missing from latest.yml" && exit 1)
          echo "Both architectures verified in latest.yml"
          cat release/latest.yml

      - name: Generate and upload SHA-256 checksums
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release
          sha256sum *.exe *.blockmap > checksums.sha256
          cat checksums.sha256
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          gh release upload "$TAG" checksums.sha256 --clobber
